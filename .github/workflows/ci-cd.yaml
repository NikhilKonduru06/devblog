name: DevBlog CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devblog-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devblog-frontend

jobs:
  # ── TEST ────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7-jammy
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run backend tests
        env:
          MONGODB_URI: mongodb://localhost:27017/devblog_test
          GEMINI_API_KEY: test_key
          NODE_ENV: test
        run: cd backend && npm test

  # ── BUILD & PUSH ────────────────────────────────────────────────────────────
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            REACT_APP_API_URL=/api
            REACT_APP_WS_URL=ws://devblog.example.com
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Update Kubernetes manifests with new image tags
        run: |
          sed -i "s|image: .*/devblog-backend:.*|image: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}|" k8s/backend.yaml
          sed -i "s|image: .*/devblog-frontend:.*|image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}|" k8s/frontend.yaml

      - name: Commit updated manifests (GitOps trigger for ArgoCD)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend.yaml k8s/frontend.yaml
          git commit -m "ci: update image tags to ${{ github.sha }}" || echo "No changes to commit"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 3s..."
            sleep 3
          done
